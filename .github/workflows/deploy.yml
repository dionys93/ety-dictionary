name: Deploy Astro to Surge

on:
  push:
    branches:
      - main
    # 1. PATH FILTERING: Only trigger if files in these specific folders change.
    paths:
      - 'web/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 2. WORKING DIRECTORY: Tells GitHub to run all npm commands inside the /web folder
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FEATURE A: Dependency Caching (Makes subsequent builds significantly faster)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Dependencies
        run: npm install

      # FEATURE B: Safety Check (Runs Astro's strict type and syntax checker to prevent broken deployments)
      - name: Run Astro Check
        run: npm run astro check

      - name: Build Project
        run: npm run build

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: npx surge ./dist