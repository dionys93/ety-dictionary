name: Deploy Astro to Surge

on:
  push:
    branches:
      - main
    # 1. PATH FILTERING: Only trigger if files in these specific folders change.
    paths:
      - 'web/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 2. WORKING DIRECTORY: Tells GitHub to run all npm commands inside the /web folder
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: npx surge ./dist